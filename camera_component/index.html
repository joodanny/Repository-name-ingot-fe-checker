<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; font-family: sans-serif; padding: 4px; }

#video {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  border-radius: 8px;
  background: #111;
  display: block;
}

.zoom-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
}
#zoom-label {
  font-size: 13px;
  color: #555;
  min-width: 38px;
  font-weight: bold;
}
#zoom-slider { flex: 1; accent-color: #ff4b4b; }

#capture-btn {
  width: 100%;
  padding: 12px;
  font-size: 17px;
  background: #ff4b4b;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 8px;
  font-weight: bold;
}
#capture-btn:active { opacity: 0.75; }
#capture-btn:disabled { background: #aaa; cursor: not-allowed; }

#status {
  font-size: 12px;
  color: #888;
  margin-top: 4px;
  text-align: center;
}

canvas { display: none; }
</style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>

<div class="zoom-row">
  <span id="zoom-label">1.0x</span>
  <input type="range" id="zoom-slider" min="1" max="4" step="0.1" value="1">
</div>

<button id="capture-btn" disabled>카메라 시작 중...</button>
<div id="status"></div>
<canvas id="canvas"></canvas>

<script>
/* ── Streamlit 통신 ── */
function toStreamlit(type, extra) {
  window.parent.postMessage({ type, ...extra }, "*");
}
toStreamlit("streamlit:componentReady", { apiVersion: 1 });

let track = null;
let hasHwZoom = false;

/* ── 카메라 시작 (후면 고정) ── */
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;
    track = stream.getVideoTracks()[0];

    /* 하드웨어 줌 지원 확인 */
    try {
      const caps = track.getCapabilities();
      if (caps.zoom) {
        hasHwZoom = true;
        const s = document.getElementById("zoom-slider");
        s.min   = caps.zoom.min;
        s.max   = Math.min(caps.zoom.max, 10);
        s.step  = caps.zoom.step || 0.1;
        document.getElementById("status").textContent = "하드웨어 줌 지원";
      } else {
        document.getElementById("status").textContent = "소프트웨어 줌";
      }
    } catch(e) {
      document.getElementById("status").textContent = "소프트웨어 줌";
    }

    video.onloadedmetadata = () => {
      const btn = document.getElementById("capture-btn");
      btn.disabled = false;
      btn.textContent = "📸 촬영";
      updateHeight();
    };

  } catch(e) {
    document.getElementById("capture-btn").textContent = "카메라 오류";
    document.getElementById("status").textContent = e.message;
    updateHeight();
  }
}

/* ── 줌 조절 ── */
document.getElementById("zoom-slider").addEventListener("input", async (e) => {
  const val = parseFloat(e.target.value);
  document.getElementById("zoom-label").textContent = val.toFixed(1) + "x";

  if (hasHwZoom && track) {
    try {
      await track.applyConstraints({ advanced: [{ zoom: val }] });
    } catch(err) {
      /* 하드웨어 줌 실패 시 소프트웨어 처리 */
    }
  }
});

/* ── 촬영 ── */
document.getElementById("capture-btn").addEventListener("click", () => {
  const video  = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const zoom   = parseFloat(document.getElementById("zoom-slider").value);
  const vw = video.videoWidth, vh = video.videoHeight;

  if (!vw || !vh) return;

  if (hasHwZoom) {
    /* 하드웨어 줌: 전체 프레임 캡처 */
    canvas.width = vw; canvas.height = vh;
    canvas.getContext("2d").drawImage(video, 0, 0);
  } else {
    /* 소프트웨어 줌: 중앙 크롭 후 원본 크기로 확대 */
    const cw = Math.floor(vw / zoom);
    const ch = Math.floor(vh / zoom);
    const sx = Math.floor((vw - cw) / 2);
    const sy = Math.floor((vh - ch) / 2);
    canvas.width = vw; canvas.height = vh;
    canvas.getContext("2d").drawImage(video, sx, sy, cw, ch, 0, 0, vw, vh);
  }

  const b64 = canvas.toDataURL("image/jpeg", 0.92).split(",")[1];
  toStreamlit("streamlit:setComponentValue", { value: b64, dataType: "json" });
});

/* ── Streamlit 메시지 수신 (props) ── */
window.addEventListener("message", (e) => {
  if (e.data.type === "streamlit:render") {
    updateHeight();
  }
});

function updateHeight() {
  toStreamlit("streamlit:setFrameHeight",
    { height: document.body.scrollHeight + 16 });
}

startCamera();
</script>
</body>
</html>
